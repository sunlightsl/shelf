name: local_library
description: A local library app for novels, comics, and videos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.1

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # File system
  path_provider: ^2.1.2
  file_picker: ^10.1.0
  permission_handler: ^11.3.0
  android_intent_plus: ^5.0.0

  # Archive
  archive: ^3.4.10

  # HTTP server for WiFi transfer
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  mime: ^1.0.5

  # EPUB parsing
  epubx: ^4.0.0

  # PDF
  pdf_render: ^1.4.0
  path_provider_android: ^2.2.2

  # Video player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # Video thumbnail
  video_thumbnail: ^0.5.3

  # Image viewing
  photo_view: ^0.14.0

  # Image picker for custom cover
  image_picker: ^1.0.7

  # Share and export
  share_plus: ^7.2.2

  # Intl
  intl: ^0.19.0

  # Encoding
  fast_gbk: ^1.0.0

  # Audio playback
  just_audio: ^0.9.46
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.1.25
  metadata_god: ^0.5.0

  # Lyrics scrolling
  scrollable_positioned_list: ^0.3.8

  # Desktop lyrics overlay
  flutter_overlay_window: ^0.5.0

  # Screen wakelock
  wakelock_plus: ^1.2.4

  # Video player gesture controls
  screen_brightness: ^2.1.7
  volume_controller: ^3.3.2

  # Settings persistence
  shared_preferences: ^2.2.2
  audio_metadata_reader: ^0.0.6

  # Cloud storage
  webdav_client: ^1.2.2
  flutter_secure_storage: ^9.2.2
  minio: ^3.5.8

  # WebView for OAuth login
  webview_flutter: ^4.8.0

  # HTTP client (for cloud APIs)
  dio: ^5.7.0

  # UUID generation
  uuid: ^3.0.7

  # Animation & frame splitting
  flutter_animate: ^4.5.0
  keframe: ^3.0.0

  # Privacy / Biometric auth
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  image: ^4.0.17

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/brand_logo.png"
  adaptive_icon_background: "#D4A574"
  adaptive_icon_foreground: "assets/images/brand_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
